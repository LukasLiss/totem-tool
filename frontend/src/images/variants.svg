<svg xmlns="http://www.w3.org/2000/svg" width="100" height="50" viewBox="0 0 100 50">
  <rect width="100" height="50" fill="#f0f4f8"/>
  <!-- Variant branching lines -->
  <line x1="10" y1="25" x2="30" y2="25" stroke="#2563EB" stroke-width="2"/>
  <line x1="30" y1="25" x2="50" y2="10" stroke="#2563EB" stroke-width="2"/>
  <line x1="30" y1="25" x2="50" y2="25" stroke="#10B981" stroke-width="2"/>
  <line x1="30" y1="25" x2="50" y2="40" stroke="#F59E0B" stroke-width="2"/>
  <line x1="50" y1="10" x2="70" y2="10" stroke="#2563EB" stroke-width="2"/>
  <line x1="50" y1="25" x2="70" y2="25" stroke="#10B981" stroke-width="2"/>
  <line x1="50" y1="40" x2="70" y2="40" stroke="#F59E0B" stroke-width="2"/>
  <line x1="70" y1="10" x2="90" y2="25" stroke="#2563EB" stroke-width="2"/>
  <line x1="70" y1="25" x2="90" y2="25" stroke="#10B981" stroke-width="2"/>
  <line x1="70" y1="40" x2="90" y2="25" stroke="#F59E0B" stroke-width="2"/>
  <!-- Nodes -->
  <circle cx="10" cy="25" r="4" fill="#2563EB"/>
  <circle cx="30" cy="25" r="4" fill="#64748B"/>
  <circle cx="50" cy="10" r="4" fill="#2563EB"/>
  <circle cx="50" cy="25" r="4" fill="#10B981"/>
  <circle cx="50" cy="40" r="4" fill="#F59E0B"/>
  <circle cx="70" cy="10" r="4" fill="#2563EB"/>
  <circle cx="70" cy="25" r="4" fill="#10B981"/>
  <circle cx="70" cy="40" r="4" fill="#F59E0B"/>
  <circle cx="90" cy="25" r="4" fill="#64748B"/>
</svg>
